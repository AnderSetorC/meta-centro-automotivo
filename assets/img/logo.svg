<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 50" role="img" aria-label="Meta Centro Automotivo">
  <!-- Haste preta esquerda -->
  <line x1="14" y1="46" x2="14" y2="20" stroke="#0E0E10" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Haste preta direita -->
  <line x1="46" y1="46" x2="46" y2="20" stroke="#0E0E10" stroke-width="2.2" stroke-linecap="round"/>
  <!-- M em azul ciano (topo em V invertido) -->
  <polyline points="14,20 30,4 46,20" fill="none" stroke="#00AEEF" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Raios irradiando da haste esquerda (para fora) -->
  <line x1="9"  y1="38" x2="2"  y2="38" stroke="#0E0E10" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="9"  y1="34" x2="1"  y2="31" stroke="#0E0E10" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="9"  y1="30" x2="1"  y2="25" stroke="#0E0E10" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="9"  y1="26" x2="2"  y2="20" stroke="#0E0E10" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="9"  y1="22" x2="4"  y2="14" stroke="#0E0E10" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Raios irradiando da haste direita (para fora) -->
  <line x1="51" y1="38" x2="58" y2="38" stroke="#0E0E10" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="51" y1="34" x2="59" y2="31" stroke="#0E0E10" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="51" y1="30" x2="59" y2="25" stroke="#0E0E10" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="51" y1="26" x2="58" y2="20" stroke="#0E0E10" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="51" y1="22" x2="56" y2="14" stroke="#0E0E10" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Separador vertical fino -->
  <line x1="63" y1="10" x2="63" y2="40" stroke="#0E0E10" stroke-width="1.2"/>
  <!-- Wordmark META -->
  <text x="68" y="26" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="22" fill="#00AEEF" letter-spacing="0.5">META</text>
  <!-- Subword CENTRO AUTOMOTIVO -->
  <text x="68" y="40" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="6.2" fill="#0E0E10" letter-spacing="1.2">CENTRO AUTOMOTIVO</text>
</svg>
